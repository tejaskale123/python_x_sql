{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update User</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
<div class="container update-form">
    <h2>Update User</h2>

    {% if messages %}
        {% for message in messages %}
            <div class="alert {{ message.tags }}">{{ message }}</div>
        {% endfor %}
    {% endif %}

    <form method="POST">
        {% csrf_token %}

        <div class="form-group">
            <label for="name">Name</label>
            <input type="text" id="name" name="name" value="{{ user.username }}" placeholder="Enter Username" required>
        </div>

        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" value="{{ user.email }}" placeholder="Enter Email" required>
        </div>

        <button type="submit" class="btn primary">Update User</button>
    </form>

    <div class="form-actions">
        <a href="/users/" class="btn secondary">Back to Users</a>
        <a href="/dashboard/" class="btn tertiary">Dashboard</a>
    </div>
</div>
</body>
</html>
